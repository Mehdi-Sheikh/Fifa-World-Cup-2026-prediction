<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>World Cup Prediction League</title>
<style>
:root{--bg:#071421;--card:#102238;--card2:#132941;--line:#29405b;--text:#f5fbff;--muted:#a9c0d6;--accent:#22b8ff;--good:#20d37b;--warn:#ffd166;--bad:#ff5c7a}
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:linear-gradient(180deg,#071421,#0b1d31);color:var(--text)}
.wrap{max-width:1160px;margin:0 auto;padding:22px}h1{margin:0 0 8px;font-size:36px;text-align:right}.sub{color:var(--muted);margin:0 0 22px;line-height:1.8}
.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:16px}
.badge{border:1px solid #1579a5;background:#082f49;border-radius:999px;padding:8px 14px;font-weight:700;direction:ltr}
.tabs{display:flex;gap:10px;flex-wrap:wrap}button{cursor:pointer;border:1px solid var(--line);background:#16263a;color:var(--text);border-radius:999px;padding:10px 14px;font-weight:700}button.active{border-color:var(--accent);background:#073b59}
.grid{display:grid;grid-template-columns:390px 1fr;gap:16px}@media(max-width:850px){.grid{grid-template-columns:1fr}}
.card{background:rgba(16,34,56,.92);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 14px 35px rgba(0,0,0,.22)}.card h2{font-size:18px;margin:0;padding:18px;border-bottom:1px solid var(--line)}.body{padding:14px}
.search{width:100%;background:#243448;border:1px solid #38506b;color:var(--text);border-radius:14px;padding:13px 16px;margin-bottom:12px;text-align:right}
.match{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px;margin:10px 0;cursor:pointer;transition:.15s}
.match:hover{transform:translateY(-1px);border-color:#2abfff}.team{display:flex;gap:8px;align-items:center;font-weight:800}.team.away{justify-content:flex-start;direction:ltr}.flag{font-size:25px;line-height:1}.score{font-size:24px;font-weight:900;direction:ltr;min-width:76px;text-align:center}.meta{grid-column:1/4;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.status{border-radius:999px;padding:3px 8px;font-weight:700}.final{color:var(--good)}.live{color:var(--bad)}.scheduled{color:var(--warn)}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:right}th{color:#dff4ff}tr:nth-child(even){background:rgba(255,255,255,.025)}.rank{font-weight:900;color:var(--warn)}
.hidden{display:none}.small{font-size:12px;color:var(--muted)}.empty{color:var(--muted);padding:20px;text-align:center}.ltr{direction:ltr;text-align:left}
.pred{display:flex;justify-content:space-between;gap:12px;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);padding:10px 0}.pts{font-weight:900}.pts.good{color:var(--good)}.pts.mid{color:var(--warn)}.pts.zero{color:var(--bad)}
.err{background:#3a1f27;border:1px solid #80374a;color:#ffd8df;border-radius:12px;padding:10px;margin:10px 0;direction:ltr;text-align:left;white-space:pre-wrap}
.infoBox{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin-bottom:12px}
</style>
</head>

<div class="wrap">

    </div>
  </div>
  <h1>World Cup Prediction League</h1>

  if(!actual) return null;
  const p=parseScore(pred), a=parseScore(actual); if(!p||!a) return 0;
  if(p[0]===a[0] && p[1]===a[1]) return 6;
  if(Math.sign(p[0]-p[1])===Math.sign(a[0]-a[1])) return 4;
  return 0;
}
function rankings(){
  return Object.keys(DATA.predictions).map(name=>{
    let total=0, exact=0, outcome=0, wrong=0;
    for(const [id,p] of Object.entries(DATA.predictions[name])){
      const pt=points(p, realResults[id]);
      if(pt==null) continue; total += pt; if(pt===6) exact++; else if(pt===4) outcome++; else wrong++;
    }
    return {name,total,exact,outcome,wrong};
  }).sort((a,b)=>b.total-a.total || b.exact-a.exact || a.name.localeCompare(b.name));
}
function renderRankings(){
  const rows = rankings();
  document.getElementById('rankings').innerHTML = `<table><thead><tr><th>#</th><th>نام</th><th>امتیاز</th><th>۶</th><th>۴</th><th>۰</th></tr></thead><tbody>` + rows.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${r.name}</td><td><b>${r.total}</b></td><td>${r.exact}</td><td>${r.outcome}</td><td>${r.wrong}</td></tr>`).join('') + `</tbody></table>`;
}
function windowRange(){
  const now = new Date();
  const start = new Date(now); start.setHours(0,0,0,0);
  if(now.getHours() < 9) start.setDate(start.getDate()-1);
  const end = new Date(start); end.setDate(end.getDate()+1); end.setHours(9,0,0,0);
  return [start,end];
}
function filteredMatches(){
  const q = norm(document.getElementById('search').value);
  let arr = [...DATA.matches].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(currentTab==='window'){ const [s,e]=windowRange(); arr=arr.filter(m=>{const d=new Date(m.date); return d>=s && d<=e;}); }
  if(currentTab==='final') arr=arr.filter(m=>realResults[m.id]);
  if(q) arr=arr.filter(m=>norm(`${m.home} ${m.away} ${m.group} ${m.date}`).includes(q));
  return arr;
}
function renderMatches(){
  document.getElementById('info').classList.add('hidden'); document.getElementById('matches').classList.remove('hidden');
  let title = currentTab==='all'?'همه بازی‌ها':currentTab==='final'?'فقط بازی‌های نتیجه‌دار':'بازی‌های امروز تا فردا 09:00';
  document.getElementById('title').textContent = title;
  if(currentTab==='window'){const [s,e]=windowRange(); document.getElementById('rangeText').textContent = `${s.toLocaleString()} → ${e.toLocaleString()}`;} else document.getElementById('rangeText').textContent='';
  const arr = filteredMatches();
  document.getElementById('matches').innerHTML = arr.length ? arr.map(m=>{
    const actual = realResults[m.id]; const st = actual ? '<span class="status final">Final</span>' : '<span class="status scheduled">Scheduled</span>'; const score = actual || 'vs';
    return `<div class="match" onclick="showInfo('${m.id}')"><div class="team"><span class="flag">${flag(m.home)}</span><span>${m.home}</span></div><div class="score">${score}</div><div class="team away"><span>${m.away}</span><span class="flag">${flag(m.away)}</span></div><div class="meta"><span>Group ${m.group} · ${new Date(m.date).toLocaleString()}</span>${st}</div></div>`;
  }).join('') : '<div class="empty">بازی‌ای برای این بازه پیدا نشد.</div>';
}
function showInfo(id){
  selectedMatchId = id; currentTab='info'; setTabs();
  const m = DATA.matches.find(x=>x.id===id); const actual = realResults[id];
  const preds = Object.keys(DATA.predictions).map(name=>{ const p=DATA.predictions[name][id]; const pt=points(p,actual); return {name,p,pt}; }).sort((a,b)=>(b.pt??-1)-(a.pt??-1)||a.name.localeCompare(b.name));
  document.getElementById('matches').classList.add('hidden'); document.getElementById('info').classList.remove('hidden');
  document.getElementById('title').textContent = 'اطلاعات بازی'; document.getElementById('rangeText').textContent='';
  document.getElementById('info').innerHTML = `<div class="infoBox"><h2 style="border:0;padding:0;margin:0 0 12px">${flag(m.home)} ${m.home} <span class="ltr">${actual||'vs'}</span> ${m.away} ${flag(m.away)}</h2><div class="small">Group ${m.group} · ${new Date(m.date).toLocaleString()} · Match #${m.id}</div></div>` + preds.map(x=>`<div class="pred"><b>${x.name}</b><span class="ltr">${x.p||'-'}</span><span class="pts ${x.pt===6?'good':x.pt===4?'mid':'zero'}">${x.pt==null?'—':x.pt}</span></div>`).join('');
}
function setTabs(){
  for(const [id,val] of [['tabWindow','window'],['tabAll','all'],['tabFinal','final'],['tabInfo','info']]) document.getElementById(id).classList.toggle('active', currentTab===val);
}
function renderAll(){renderRankings(); if(currentTab==='info' && selectedMatchId) showInfo(selectedMatchId); else renderMatches(); setTabs();}
document.getElementById('tabWindow').onclick=()=>{currentTab='window'; renderAll();};
document.getElementById('tabAll').onclick=()=>{currentTab='all'; renderAll();};
document.getElementById('tabFinal').onclick=()=>{currentTab='final'; renderAll();};
document.getElementById('tabInfo').onclick=()=>{ if(selectedMatchId) showInfo(selectedMatchId); else {currentTab='all'; renderAll();} };
document.getElementById('search').oninput=renderMatches;
loadResults();
</script>
</body></html>
